name: CI

on:
  push:
    branches: [main, v2-typescript]
  pull_request:
    branches: [main, v2-typescript]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # version from packageManager in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build core (needed for bot references)
        run: pnpm --filter @wai/core build
      - name: Typecheck core
        run: pnpm --filter @wai/core typecheck
      - name: Typecheck bot
        run: pnpm --filter @wai/bot typecheck

  test:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # version from packageManager in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build core
        run: pnpm --filter @wai/core build
      - name: Test core
        run: pnpm --filter @wai/core test
      - name: Test bot
        run: pnpm --filter @wai/bot test
