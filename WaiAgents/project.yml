name: WaiAgents
options:
  bundleIdPrefix: com.waiagents
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  WaiAgentsKitPackage:
    path: "."

targets:
  WaiAgents-macOS:
    type: application
    platform: macOS
    sources:
      - Sources/WaiAgentsApp
    dependencies:
      - package: WaiAgentsKitPackage
        product: WaiAgentsKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.waiagents.app
        PRODUCT_NAME: WaiAgents
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Sources/WaiAgentsApp/Info-macOS.plist
        INFOPLIST_KEY_CFBundleDisplayName: WaiAgents
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.social-networking"
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O

  WaiAgents-iOS:
    type: application
    platform: iOS
    sources:
      - Sources/WaiAgentsApp
    dependencies:
      - package: WaiAgentsKitPackage
        product: WaiAgentsKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.waiagents.app
        PRODUCT_NAME: WaiAgents
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Sources/WaiAgentsApp/Info-iOS.plist
        INFOPLIST_KEY_CFBundleDisplayName: WaiAgents
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
